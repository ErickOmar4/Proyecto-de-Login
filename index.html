<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- SIDEBAR (Estructura de diseño con Tailwind) -->
    <aside id="sidebar" class="bg-slate-800 text-white w-64 min-h-screen transition-all duration-300 ease-in-out z-20 flex flex-col">
        <div class="p-5 flex items-center justify-between border-b border-slate-700">
            <span class="text-xl font-bold tracking-wider">MI SISTEMA</span>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <div>
                <button id="btnMenuUsuarios" class="w-full flex items-center justify-between p-2 rounded-md hover:bg-slate-700 transition">
                    <span> Usuarios</span>
                    <span id="flechaUsuarios" class="text-xs transform transition-transform">▼</span>
                </button>
                <div id="submenuCaptura" class="pl-6 mt-1 space-y-1 hidden">
                    <button id="linkCaptura" class="w-full text-left p-2 text-sm text-slate-300 hover:text-white rounded-md hover:bg-slate-700 transition">
                         Captura
                    </button>
                </div>
            </div>
            <button id="linkAlumnos" class="w-full text-left p-2 rounded-md hover:bg-slate-700 transition">
                 Alumnos
            </button>
        </nav>
    </aside>

    <!-- ÁREA DE CONTENIDO PRINCIPAL -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        
        <!-- NAVBAR -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10">
            <button id="btnHamburguesa" class="p-2 text-gray-600 hover:bg-gray-100 rounded-md focus:outline-none">
                ☰
            </button>
            
            <div class="relative">
                <button id="btnUserDropdown" class="flex items-center space-x-2 text-gray-700 hover:text-indigo-600 font-medium focus:outline-none">
                    <span id="navbarUsuario">Usuario</span>
                    <span class="text-xs">▼</span>
                </button>
                <div id="userDropdownMenu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 ring-1 ring-black ring-opacity-5 hidden">
                    <button id="btnSalir" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-red-50 hover:text-red-600 transition">
                         Salir del sistema
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            
            <!-- SECCIÓN: CAPTURA DE USUARIOS -->
            <div id="seccionCaptura" class="hidden max-w-lg bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Registro de Usuario</h3>
                <form id="formUsuario" class="space-y-4">
                    <div>
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="usrNombre" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="usrCorreo" required class="form-input">
                        <p id="mensajeCorreo" class="error-text hidden"></p>
                        
                    </div>
                    <div>
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="usrPassword" required class="form-input">
                    </div>
                    <button type="submit" class="btn-primary !w-auto">
                        Registrar Usuario
                    </button>
                </form>
                <p id="resultadoUsr" class="mt-3 text-sm font-medium"></p>
            </div>

            <!-- SECCIÓN: FORMULARIO DE ALUMNOS -->
            <div id="seccionAlumnos" class="hidden max-w-lg bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Registro de Alumnos</h3>
                <form id="formAlumnos" class="space-y-4">
                    <div>
                        <label class="form-label">Número de Control (6 dígitos)</label>
                        <input type="text" id="alNoControl" required class="form-input">
                        <p id="erroNumControl" class="error-text hidden"></p>
                    </div>
                    <div>
                        <label class="form-label">Nombre del Alumno</label>
                        <input type="text" id="alNombre" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Fecha de Nacimiento</label>
                        <input type="date" id="alFechaNac" required class="form-input">
                    </div>
                    <button type="submit" class="btn-secondary">
                        Evaluar Alumno
                    </button>
                </form>
                <p id="resultadoAl" class="mt-3 text-sm font-medium text-red-500"></p>
            </div>

        </main>
    </div>

    <!-- MODAL DE EDAD -->
    <div id="modalEdad" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
            <h4 class="text-lg font-bold text-gray-900 mb-2">Validación de Edad</h4>
            <p id="modalTextoEdad" class="text-gray-600 text-sm mb-4"></p>
            <div class="flex justify-end">
                <button id="btnCerrarModal" class="px-4 py-2 bg-gray-800 text-white rounded-md hover:bg-gray-700 transition text-sm font-medium">
                    Entendido
                </button>
            </div>
        </div>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/sistema.js"></script>
</body>
</html>
