<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Iniciar Sesión</title>
    <!-- Tailwind CSS CDN para la estructura -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
        
        <form id="formLogin" class="space-y-4">
            <div>
                <label for="loginCorreo" class="form-label">Correo Electrónico</label>
                <input type="email" id="loginCorreo" placeholder="usuario@dominio.com" class="form-input">
                <p id="errorCorreo" class="error-text hidden"></p>
            </div>

            <div>
                <label for="loginPassword" class="form-label">Contraseña</label>
                <input type="password" id="loginPassword" placeholder="12345Eo%" class="form-input">
                <p id="errorPassword" class="error-text hidden"></p>
            </div>

            <button type="submit" class="btn-primary">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
